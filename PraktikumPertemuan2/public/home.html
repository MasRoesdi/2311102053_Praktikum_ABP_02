<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Kalkulasi Pengeluaran</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- DataTables CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css"
  />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">Kalkulasi Pengeluaran</a>
      <div>
        <a href="home.html" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="tambah.html" class="btn btn-light btn-sm">Tambah Pengeluaran</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">Daftar Pengeluaran</h3>
      <a href="tambah.html" class="btn btn-success">+ Tambah Pengeluaran</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table id="tabelPengeluaran" class="table table-striped table-bordered">
            <thead class="table-primary">
              <tr>
                <th>ID</th>
                <th>Tanggal</th>
                <th>Deskripsi</th>
                <th>Tipe</th>
                <th>Jumlah (Rp)</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <script>
    function formatRupiah(angka) {
      return Number(angka).toLocaleString("id-ID");
    }

    $(document).ready(function () {
      const table = $("#tabelPengeluaran").DataTable({
        columns: [
          { data: "id" },
          { data: "tanggal" },
          { data: "deskripsi" },
          { data: "tipe" },
          {
            data: "jumlah",
            render: function (data) {
              return "Rp " + formatRupiah(data);
            },
          },
          {
            data: null,
            orderable: false,
            render: function (data, type, row) {
              return `
                <a href="ubah.html?id=${row.id}" class="btn btn-sm btn-warning me-1">Ubah</a>
                <button class="btn btn-sm btn-danger btn-hapus" data-id="${row.id}">Hapus</button>
              `;
            },
          },
        ],
      });

      function loadData() {
        $.ajax({
          url: "/api/expenses",
          method: "GET",
          dataType: "json",
          success: function (data) {
            table.clear().rows.add(data).draw();
          },
          error: function () {
            alert("Gagal memuat data pengeluaran.");
          },
        });
      }

      loadData();

      $("#tabelPengeluaran").on("click", ".btn-hapus", function () {
        const id = $(this).data("id");
        if (!confirm("Yakin ingin menghapus pengeluaran ini?")) return;

        $.ajax({
          url: "/api/expenses/" + id,
          method: "DELETE",
          success: function () {
            loadData();
          },
          error: function () {
            alert("Gagal menghapus pengeluaran.");
          },
        });
      });
    });
  </script>
</body>
</html>
