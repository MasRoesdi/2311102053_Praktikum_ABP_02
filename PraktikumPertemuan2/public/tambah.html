<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Pengeluaran - Kalkulasi Pengeluaran</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">Kalkulasi Pengeluaran</a>
      <div>
        <a href="home.html" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="tambah.html" class="btn btn-light btn-sm">Tambah Pengeluaran</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0">Form Tambah Pengeluaran</h5>
          </div>
          <div class="card-body">
            <form id="formPengeluaran">
              <div class="mb-3">
                <label for="tanggal" class="form-label">Tanggal</label>
                <input type="date" class="form-control" id="tanggal" name="tanggal" required />
              </div>
              <div class="mb-3">
                <label for="deskripsi" class="form-label">Deskripsi</label>
                <input
                  type="text"
                  class="form-control"
                  id="deskripsi"
                  name="deskripsi"
                  placeholder="Contoh: Bayar listrik"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="tipe" class="form-label">Tipe Pengeluaran</label>
                <select class="form-select" id="tipe" name="tipe" required>
                  <option value="">-- Pilih Tipe --</option>
                  <option value="tetap">Tetap</option>
                  <option value="variabel">Variabel</option>
                  <option value="darurat">Darurat</option>
                  <option value="konsumtif">Konsumtif</option>
                  <option value="investasi">Investasi</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="jumlah" class="form-label">Jumlah (Rp)</label>
                <input
                  type="number"
                  class="form-control"
                  id="jumlah"
                  name="jumlah"
                  min="0"
                  step="500"
                  required
                />
              </div>
              <div class="d-flex justify-content-between">
                <a href="home.html" class="btn btn-secondary">Kembali</a>
                <button type="submit" class="btn btn-success">Simpan</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    $(document).ready(function () {
      $("#formPengeluaran").on("submit", function (e) {
        e.preventDefault();

        const data = {
          tanggal: $("#tanggal").val(),
          deskripsi: $("#deskripsi").val(),
          tipe: $("#tipe").val(),
          jumlah: $("#jumlah").val(),
        };

        $.ajax({
          url: "/api/expenses",
          method: "POST",
          contentType: "application/json",
          data: JSON.stringify(data),
          success: function () {
            alert("Pengeluaran berhasil ditambahkan.");
            window.location.href = "home.html";
          },
          error: function (xhr) {
            const msg = xhr.responseJSON?.message || "Gagal menambahkan pengeluaran.";
            alert(msg);
          },
        });
      });
    });
  </script>
</body>
</html>
